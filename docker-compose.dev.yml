services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: benisploy
      POSTGRES_USER: benisploy
      POSTGRES_PASSWORD: benisploy-dev
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benisploy -d benisploy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
