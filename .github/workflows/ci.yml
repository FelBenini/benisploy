name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/branch to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: apps/web/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (svelte-check + tsc)
        run: bun run check

      - name: Lint (eslint + prettier)
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  node-agent:
    name: node-agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/node-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/node-agent/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: apps/node-agent
